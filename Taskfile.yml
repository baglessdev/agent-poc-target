version: '3'

tasks:
  build:
    desc: "Compile"
    cmds:
      - go build ./...

  test:
    desc: "Unit tests with race detector"
    cmds:
      - go test -race ./...

  lint:
    desc: "go vet + gofmt check"
    cmds:
      - go vet ./...
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "not gofmt-clean:"
          echo "$unformatted"
          exit 1
        fi

  verify:
    desc: "Local gate — must pass before PR"
    cmds:
      - task: lint
      - task: build
      - task: test
